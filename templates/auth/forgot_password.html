{% extends 'base.html' %}
{% block title %}Forgot Password – NoteShare{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5 col-lg-4">
    <div class="card p-4">
      <h5 class="fw-bold mb-3">Reset Password</h5>
      <p class="text-muted small">Enter your email and we'll send a reset link.</p>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email address</label>
          <input type="email" name="email" class="form-control" required autofocus/>
        </div>
        <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
      </form>
      <p class="text-center mt-3 mb-0 small"><a href="{{ url_for('auth.login') }}">Back to login</a></p>
    </div>
  </div>
</div>
{% endblock %}
