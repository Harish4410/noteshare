{% extends 'base.html' %}
{% block title %}Upload Note{% endblock %}
{% block page_title %}Upload Note{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card p-4">
      <h5 class="fw-bold mb-4"><i class="bi bi-cloud-upload me-2 text-primary"></i>Upload a Note</h5>
      <form method="POST" enctype="multipart/form-data">
        <div class="mb-3">
          <label class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
          <input type="text" name="title" class="form-control" required autofocus/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Subject</label>
          <input type="text" name="subject" class="form-control" placeholder="e.g. Mathematics, Physics, History"/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Description</label>
          <textarea name="description" class="form-control" rows="3" placeholder="What's in this note?"></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">File <span class="text-danger">*</span></label>
          <input type="file" name="file" class="form-control" accept=".pdf,.doc,.docx,.txt,.ppt,.pptx,.png,.jpg,.jpeg" required/>
          <div class="form-text">PDF, DOC, DOCX, TXT, PPT, PPTX, PNG, JPG &nbsp;|&nbsp; Max 16 MB</div>
        </div>
        <div class="mb-4 form-check">
          <input type="checkbox" name="is_public" class="form-check-input" id="pub" checked/>
          <label class="form-check-label" for="pub">Make this note public</label>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">
          <i class="bi bi-upload me-2"></i>Upload Note
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>initDragDrop('drop-zone', 'file-input');</script>
{% endblock %}
