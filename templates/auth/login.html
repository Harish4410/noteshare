{% extends 'base.html' %}
{% block title %}Login – NoteShare{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5 col-lg-4">
    <div class="card p-4">
      <div class="text-center mb-3">
        <span style="font-size:2.5rem">📚</span>
        <h4 class="fw-bold mt-1">Sign in to NoteShare</h4>
      </div>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email or Username</label>
          <input type="text" name="identifier" class="form-control" required autofocus/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" required/>
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
        <div class="text-center small">
          <a href="{{ url_for('auth.forgot_password') }}" class="text-muted">Forgot password?</a>
        </div>
      </form>
    </div>
    <p class="text-center mt-3 text-muted small">
      No account? <a href="{{ url_for('auth.register') }}">Register free</a>
    </p>
  </div>
</div>
{% endblock %}
